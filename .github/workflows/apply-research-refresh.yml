name: Apply research-aligned playground refresh

on:
  push:
    branches:
      - codex/research-aligned-refresh
    paths:
      - .github/workflows/apply-research-refresh.yml

permissions:
  contents: write

jobs:
  apply-refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out refresh branch
        uses: actions/checkout@v4
        with:
          ref: codex/research-aligned-refresh
          fetch-depth: 0

      - name: Materialize refreshed site
        shell: bash
        run: |
          cat .refresh-payload/part* | base64 --decode > /tmp/pgdpo-site.tgz
          tar -xzf /tmp/pgdpo-site.tgz -C "$GITHUB_WORKSPACE"
          rm -rf .refresh-payload
          rm -f .github/workflows/apply-research-refresh.yml

      - name: Commit refreshed site
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Implement research-aligned five-mode playground [skip ci]"
          git push origin HEAD:codex/research-aligned-refresh
